services:
  app:
    image: node:22-bookworm-slim
    working_dir: /app
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_TEST_WASM: "1"
      NEXT_IGNORE_INCORRECT_LOCKFILE: "1"
      CI: ""
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
    command: >
      sh -c "npm install && npm run dev -- --hostname 0.0.0.0 --port 3000"

volumes:
  app_node_modules:
